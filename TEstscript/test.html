<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hariando Muthi</title>
</head>

<body>
    <h1>Hallo</h1>
    <img src="love.gif" alt="">
    <h1>Mau makan ? </h1>
    <button id="btn_mau" onclick="alert('I love You')">Mau</button>
    <button id="btn_mau" onclick="gamau(this)" style="position: fixed;">gamau</button>

    <script>
        function gamau(id) {
            var mau = document.getElementById("btn_mau");
            var i = Math.floor(Math.random() * 300) + 1;
            var j = Math.floor(Math.random() * 100) + mau.offsetTop;
            id.style.left = i + "px";
            id.style.top = j + "px";
        }
    </script>
</body>

</html>
